<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>UA-LOTTERY</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --accent: #0088cc; --bg: #0d1117; --card: #161b22; --border: #30363d; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; text-align: center; margin: 0; padding: 10px; }
        
        /* Фіксована кнопка гаманця, щоб не зникала */
        #ton-connect-button { 
            display: flex; 
            justify-content: center; 
            min-height: 44px;
            margin: 10px auto 20px auto;
            z-index: 100;
        }

        .lottery-container { 
            max-width: 360px; 
            margin: 0 auto; 
            background: var(--card); 
            border: 1px solid var(--border); 
            padding: 20px; 
            border-radius: 24px; 
        }
        
        .price { color: var(--accent); font-weight: bold; font-size: 18px; margin: 5px 0 20px 0; }

        .tickets-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .ticket { 
            background: #21262d; border: 2px solid var(--border); padding: 20px 0; 
            border-radius: 12px; font-size: 22px; font-weight: bold; cursor: pointer; 
        }
        .ticket.bought { background: var(--accent); border-color: white; }

        /* Спрощене колесо через картинку-фон, щоб не ламалося */
        .wheel-wrap { position: relative; width: 250px; height: 250px; margin: 0 auto; }
        .pointer { 
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%); 
            width: 0; height: 0; border-left: 12px solid transparent; 
            border-right: 12px solid transparent; border-top: 24px solid #ff4444; z-index: 5; 
        }
        #wheel-canvas { width: 100%; height: 100%; transition: transform 5s cubic-bezier(0.15, 0, 0.2, 1); }

        #status { font-size: 13px; color: #8b949e; margin-top: 20px; }
        
        #admin-panel { display: none; margin-top: 20px; border-top: 1px solid var(--border); padding-top: 15px; }
        .btn-admin { background: #238636; color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; margin-bottom: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ton-connect-button"></div>

    <div class="lottery-container">
        <div style="font-size: 10px; color: #8b949e; letter-spacing: 2px;">UA-LOTTERY</div>
        <h2 style="margin: 5px 0;">Оберіть квиток</h2>
        <div class="price">0.01 TON</div>

        <div class="tickets-grid">
            <div class="ticket" id="t1" onclick="handleTicket(1)">1</div>
            <div class="ticket" id="t2" onclick="handleTicket(2)">2</div>
            <div class="ticket" id="t3" onclick="handleTicket(3)">3</div>
            <div class="ticket" id="t4" onclick="handleTicket(4)">4</div>
            <div class="ticket" id="t5" onclick="handleTicket(5)">5</div>
            <div class="ticket" id="t6" onclick="handleTicket(6)">6</div>
        </div>

        <div class="wheel-wrap">
            <div class="pointer"></div>
            <canvas id="wheel-canvas" width="300" height="300"></canvas>
        </div>

        <div id="status">Підключіть гаманець для оплати</div>

        <div id="admin-panel">
            <button class="btn-admin" onclick="spinWheel()">КРУТИТИ КОЛЕСО</button>
            <button class="btn-admin" style="background:#ff4444" onclick="resetAll()">СКИДАННЯ</button>
        </div>
    </div>

    <script>
        // Ініціалізація гаманця
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://leslav2025.github.io/UA-lottery/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        // Малюємо колесо на Canvas (це найнадійніший метод)
        const canvas = document.getElementById('wheel-canvas');
        const ctx = canvas.getContext('2d');
        const colors = ['#0088cc', '#161b22', '#0088cc', '#161b22', '#0088cc', '#161b22'];
        
        for (let i = 0; i < 6; i++) {
            ctx.beginPath();
            ctx.fillStyle = colors[i];
            ctx.moveTo(150, 150);
            ctx.arc(150, 150, 145, i * Math.PI/3, (i+1) * Math.PI/3);
            ctx.fill();
            ctx.save();
            ctx.translate(150, 150);
            ctx.rotate(i * Math.PI/3 + Math.PI/6);
            ctx.fillStyle = "white";
            ctx.font = "bold 24px Arial";
            ctx.fillText(i + 1, 80, 10);
            ctx.restore();
        }

        if(window.location.hash === "#Leslav") {
            document.getElementById('admin-panel').style.display = 'block';
        }

        async function handleTicket(num) {
            if (!tonConnectUI.account) {
                alert("Будь ласка, натисніть 'Connect Wallet' зверху!");
                return;
            }

            const tx = {
                validUntil: Math.floor(Date.now() / 1000) + 120,
                messages: [{
                    address: "UQAtfK2M3gE8B9S1X7W0D5V6J4P9N2K1R8T5C4X7Y0Z9A2B3",
                    amount: "10000000"
                }]
            };

            try {
                await tonConnectUI.sendTransaction(tx);
                document.getElementById('t' + num).classList.add('bought');
                document.getElementById('status').innerText = "Квиток №" + num + " придбано!";
            } catch (e) {
                alert("Помилка оплати");
            }
        }

        let rotation = 0;
        function spinWheel() {
            rotation += 1800 + Math.random() * 360;
            document.getElementById('wheel-canvas').style.transform = `rotate(${rotation}deg)`;
        }

        function resetAll() {
            location.reload();
        }
    </script>
</body>
</html>
