<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UA-LOTTERY — Колесо Фортуни</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --accent: #0088cc; --bg: #0d1117; --card: #161b22; --border: #30363d; --ton-blue: #0088cc; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; margin: 0; }
        
        #ton-connect-button { display: flex; justify-content: center; margin: 20px 0; }
        .lottery-container { max-width: 400px; margin: 0 auto; background: var(--card); border: 1px solid var(--border); padding: 25px; border-radius: 25px; }
        
        /* Квитки */
        .tickets-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .ticket { 
            background: #21262d; border: 2px solid var(--border); padding: 20px 5px; 
            border-radius: 15px; font-size: 22px; font-weight: bold; cursor: pointer; transition: 0.3s; 
        }
        .ticket.bought { background: var(--ton-blue); border-color: white; box-shadow: 0 0 15px var(--ton-blue); pointer-events: none; }

        /* Колесо Фортуни */
        .wheel-box { position: relative; width: 260px; height: 260px; margin: 30px auto; border: 8px solid var(--border); border-radius: 50%; box-shadow: 0 0 20px rgba(0,0,0,0.5); overflow: hidden; }
        #wheel { width: 100%; height: 100%; border-radius: 50%; transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1); position: relative; }
        .wheel-sector { position: absolute; width: 50%; height: 50%; transform-origin: 100% 100%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; border: 1px solid var(--bg); }
        .pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid #ff4444; z-index: 10; }

        /* Адмінка */
        #admin-panel { display: none; margin-top: 25px; padding: 15px; border: 2px dashed #ffcc00; border-radius: 20px; }
        .btn-action { background: #238636; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 10px; }
        .btn-reset { background: #ff4444; }
    </style>
</head>
<body>

    <div id="ton-connect-button"></div>

    <div class="lottery-container">
        <div style="font-size: 11px; color: #8b949e; letter-spacing: 3px;">UA-LOTTERY</div>
        <h2 style="margin: 10px 0;">ОБЕРІТЬ КВИТОК</h2>
        <div style="color: var(--ton-blue); font-weight: bold;">Ціна: 0.01 TON</div>

        <div class="tickets-grid" id="grid">
            <div class="ticket" id="t1" onclick="payWithTon(1)">1</div>
            <div class="ticket" id="t2" onclick="payWithTon(2)">2</div>
            <div class="ticket" id="t3" onclick="payWithTon(3)">3</div>
            <div class="ticket" id="t4" onclick="payWithTon(4)">4</div>
            <div class="ticket" id="t5" onclick="payWithTon(5)">5</div>
            <div class="ticket" id="t6" onclick="payWithTon(6)">6</div>
        </div>

        <div class="wheel-box">
            <div class="pointer"></div>
            <div id="wheel"></div>
        </div>

        <div id="status" style="font-size: 13px; color: #8b949e;">Підключіть гаманець для участі</div>

        <div id="admin-panel">
            <button class="btn-action" onclick="spinWheel()">🔥 ЗАПУСТИТИ КОЛЕСО</button>
            <button class="btn-action btn-reset" onclick="resetLottery()">♻️ НОВА ЛОТЕРЕЯ</button>
        </div>
    </div>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://leslav2025.github.io/UA-lottery/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        // ПЕРЕВІРКА АДМІНА (Тільки для @Leslav через URL)
        if(window.location.hash === "#Leslav") {
            document.getElementById('admin-panel').style.display = 'block';
        }

        // Побудова секторів колеса
        const wheelEl = document.getElementById('wheel');
        for(let i=0; i<6; i++) {
            const sec = document.createElement('div');
            sec.className = 'wheel-sector';
            sec.style.transform = `rotate(${i * 60}deg) skewY(-30deg)`;
            sec.style.background = i % 2 === 0 ? '#0088cc' : '#21262d';
            sec.innerHTML = `<span style="transform: skewY(30deg) rotate(30deg); color: white;">${i+1}</span>`;
            wheelEl.appendChild(sec);
        }

        async function payWithTon(num) {
            const wallet = tonConnectUI.account;
            if (!wallet) { alert("Підключіть гаманець!"); return; }

            const tx = {
                validUntil: Math.floor(Date.now() / 1000) + 120,
                messages: [{ address: "UQAtfK2M3gE8B9S1X7W0D5V6J4P9N2K1R8T5C4X7Y0Z9A2B3", amount: "10000000" }]
            };

            try {
                await tonConnectUI.sendTransaction(tx);
                document.getElementById('t' + num).classList.add('bought');
                document.getElementById('t' + num).innerText = "✅";
                window.open(`https://t.me/tokenpist_bot?text=🎰 ПРИДБАНО КВИТОК №${num}%0A👤 Гаманець: ${wallet.address.slice(0,6)}...`, '_blank');
            } catch (e) { alert("Оплату не підтверджено"); }
        }

        let currentRotation = 0;
        function spinWheel() {
            const randomExtra = Math.floor(Math.random() * 360) + 1800; // Мінімум 5 обертів
            currentRotation += randomExtra;
            wheelEl.style.transform = `rotate(${currentRotation}deg)`;
            
            setTimeout(() => {
                const actualDegree = currentRotation % 360;
                const winner = 6 - Math.floor(actualDegree / 60);
                alert("🎰 ПЕРЕМОЖЕЦЬ: КВИТОК №" + (winner > 6 ? 1 : winner));
            }, 5200);
        }

        function resetLottery() {
            if(confirm("Очистити квитки та почати нову лотерею?")) {
                for(let i=1; i<=6; i++) {
                    const t = document.getElementById('t' + i);
                    t.classList.remove('bought');
                    t.innerText = i;
                }
                wheelEl.style.transform = `rotate(0deg)`;
                currentRotation = 0;
            }
        }
    </script>
</body>
</html>
