<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UA-Lottery Connect</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #0088cc; color: white; padding: 20px; }
        #ton-connect-button { display: flex; justify-content: center; margin-bottom: 20px; }
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .t { width: 90px; height: 110px; background: white; color: #0088cc; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; border: 3px solid gold; }
        .t.sold { background: #444 !important; color: #888 !important; border-color: #222 !important; pointer-events: none; }
        #admin-panel { display: none; margin-top: 30px; padding: 15px; background: rgba(255,0,0,0.2); border-radius: 10px; border: 1px dashed white; }
    </style>
</head>
<body>
    <h2>🎰 UA-Lottery TON</h2>
    
    <div id="ton-connect-button"></div>

    <div class="grid" id="container"></div>

    <div id="admin-panel">
        <p>Вітаємо, Адмін!</p>
        <button onclick="resetLotto()" style="padding:10px; cursor:pointer;">Скинути всі квитки</button>
    </div>

    <script>
        const myAdminAddress = "UQDXq1iAqu88tVRG62_k03kAXELu_1gzRBMye-VZoFRIRtWw";
        
        // Ініціалізація TON Connect
        const tonConnectUI = new TONConnectUI.TonConnectUI({
            manifestUrl: 'https://leslav2025.github.io/UA-lottery/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        // Стежимо за авторизацією
        tonConnectUI.onStatusChange(wallet => {
            if (wallet) {
                const userAddr = wallet.account.address;
                console.log("Connected:", userAddr);
                
                // Якщо зайшов адмін — показуємо кнопку
                if (userAddr.toLowerCase().includes(myAdminAddress.toLowerCase().substring(2, 10))) {
                    document.getElementById('admin-panel').style.display = 'block';
                }
            }
        });

        function resetLotto() {
            localStorage.clear();
            location.reload();
        }

        // Рендер квитків
        const container = document.getElementById('container');
        for (let i = 1; i <= 5; i++) {
            const btn = document.createElement('div');
            const isSold = localStorage.getItem('t' + i);
            btn.className = 't' + (isSold ? ' sold' : '');
            btn.innerHTML = (isSold ? 'Куплено' : 'Квиток') + '<br>#' + i;
            
            btn.onclick = async function() {
                if (!tonConnectUI.connected) {
                    alert("Спочатку підключіть гаманець!");
                    return;
                }

                const transaction = {
                    validUntil: Math.floor(Date.now() / 1000) + 60,
                    messages: [{
                        address: myAdminAddress,
                        amount: "10000000", // 0.01 TON в нанотонах
                        payload: "" // Можна додати коментар тут
                    }]
                };

                try {
                    await tonConnectUI.sendTransaction(transaction);
                    localStorage.setItem('t' + i, 'true');
                    location.reload();
                } catch (e) {
                    console.error("Помилка оплати", e);
                }
            };
            container.appendChild(btn);
        }
    </script>
</body>
</html>
