<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UA-LOTTERY — TON Edition</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --accent: #0088cc; --bg: #0d1117; --card: #161b22; --border: #30363d; --ton-blue: #0088cc; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
        
        /* Кнопка підключення гаманця */
        #ton-connect-button { display: flex; justify-content: center; margin-bottom: 20px; }

        .lottery-container { max-width: 400px; margin: 0 auto; background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 20px; }
        
        /* Слот-машина квитків */
        .tickets-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 20px 0; }
        .ticket { 
            background: #21262d; border: 2px solid var(--border); padding: 20px; 
            border-radius: 15px; font-size: 24px; font-weight: bold; cursor: pointer; 
            transition: 0.3s; color: white;
        }
        .ticket:hover { border-color: var(--ton-blue); transform: translateY(-3px); }
        .ticket.bought { background: var(--ton-blue); border-color: white; color: white; box-shadow: 0 0 15px var(--ton-blue); }

        .price-tag { color: var(--ton-blue); font-size: 18px; margin-bottom: 10px; }
        
        /* Адмінка */
        .admin-controls { margin-top: 30px; padding: 15px; border: 1px dashed #ff4444; border-radius: 15px; display: none; }
        .btn-admin { background: #ff4444; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>

    <div id="ton-connect-button"></div>

    <div class="lottery-container">
        <h1>UA-LOTTERY</h1>
        <div class="price-tag">Ціна квитка: <b>0.1 TON</b></div>
        <p>Оберіть вільний слот:</p>

        <div class="tickets-grid" id="grid">
            <div class="ticket" id="t1" onclick="payWithTon(1)">1</div>
            <div class="ticket" id="t2" onclick="payWithTon(2)">2</div>
            <div class="ticket" id="t3" onclick="payWithTon(3)">3</div>
            <div class="ticket" id="t4" onclick="payWithTon(4)">4</div>
            <div class="ticket" id="t5" onclick="payWithTon(5)">5</div>
            <div class="ticket" id="t6" onclick="payWithTon(6)">6</div>
        </div>

        <div id="status">Будь ласка, підключіть гаманець</div>
    </div>

    <div class="admin-controls" id="adminZone">
        <h4>КЕРУВАННЯ</h4>
        <button class="btn-admin" onclick="resetSlots()">Очистити квитки</button>
        <button class="btn-admin" style="background: #238636;" onclick="alert('Колесо запущено!')">Крутити колесо</button>
    </div>

    <script>
        // Налаштування TON Connect
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://leslav2025.github.io/UA-lottery/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        // Адмін-логіка
        if(window.location.hash === "#admin") {
            document.getElementById('adminZone').style.display = 'block';
        }

        async function payWithTon(ticketNum) {
            const wallet = tonConnectUI.account;
            if (!wallet) {
                alert("Спочатку підключіть TON-гаманець!");
                return;
            }

            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 60, // 60 секунд
                messages: [
                    {
                        address: "ВАША_АДРЕСА_TON_ГАМАНЦЯ", // ЗАМІНИ НА СВІЙ
                        amount: "100000000", // 0.1 TON у нанотонах
                        payload: "" // Можна додати коментар "Ticket 1"
                    }
                ]
            };

            try {
                const result = await tonConnectUI.sendTransaction(transaction);
                // Якщо оплата пройшла:
                markAsBought(ticketNum);
                notifyTelegram(ticketNum, wallet.address);
            } catch (e) {
                console.error(e);
                alert("Оплата скасована або помилка.");
            }
        }

        function markAsBought(num) {
            const el = document.getElementById('t' + num);
            el.classList.add('bought');
            el.innerText = "💸";
        }

        function notifyTelegram(num, address) {
            const shortAddr = address.substring(0, 6) + "..." + address.substring(address.length - 4);
            const msg = `🎰 НОВИЙ КВИТОК!%0A🎫 Номер: ${num}%0A👤 Гаманець: ${shortAddr}%0A💎 Статус: Оплачено в TON`;
            window.open(`https://t.me/tokenpist_bot?text=${msg}`, '_blank');
        }

        function resetSlots() {
            for(let i=1; i<=6; i++) {
                const el = document.getElementById('t' + i);
                el.classList.remove('bought');
                el.innerText = i;
            }
        }
    </script>
</body>
</html>
