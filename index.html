<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>UA LOTTERY 🎰</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --bg: #0d1117; --card: #1e293b; --text: white; }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; text-align: center; margin: 0; padding: 15px; }
        .header-block { display: flex; align-items: center; justify-content: center; gap: 12px; margin: 15px 0; }
        .logo-img { height: 45px; width: 45px; border-radius: 50%; border: 2px solid var(--accent); }
        h1 { color: var(--accent); margin: 0; font-size: 22px; text-transform: uppercase; }
        #ton-connect { display: flex; justify-content: center; margin-bottom: 20px; }
        .ticket-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; max-width: 340px; margin: 15px auto; }
        .ticket { background: var(--card); border: 2px solid #334155; height: 85px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 26px; cursor: pointer; }
        .ticket.open { background: linear-gradient(135deg, #f59e0b, #d97706); border-color: var(--accent); pointer-events: none; }
        #admin-panel { display: none; margin-top: 30px; padding: 15px; border-top: 1px dashed #334155; }
        .admin-btn { background: #7f1d1d; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header-block">
        <img src="https://img.icons8.com/color/96/ukraine-circular.png" class="logo-img">
        <h1>UA LOTTERY 🎲</h1>
    </div>

    <div id="ton-connect"></div>

    <p style="color: #94a3b8; font-size: 14px;">Тестова ціна: <b>0.01 TON</b></p>
    
    <div class="ticket-container" id="grid"></div>

    <div id="admin-panel">
        <p style="font-size: 12px; color: #ef4444;">Панель адміністратора</p>
        <button class="admin-btn" onclick="resetGame()">Скинути всі квитки</button>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const MY_WALLET = "UQDXq1iAqu88tVRG62_k03kAXELu_1gzRBMye-VZoFRIRtWw";
    const ADMIN_ID = 409059054;

    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://leslav2025.github.io/UA-lottery/tonconnect-manifest.json',
        buttonRootId: 'ton-connect'
    });

    function render() {
        const grid = document.getElementById('grid');
        const bought = JSON.parse(localStorage.getItem('boughtTickets') || '[]');
        grid.innerHTML = '';
        for (let i = 1; i <= 6; i++) {
            const isOpened = bought.includes(i);
            const div = document.createElement('div');
            div.className = 'ticket' + (isOpened ? ' open' : '');
            div.innerText = isOpened ? '№'+i : '?';
            div.onclick = () => handleTicket(i, isOpened);
            grid.appendChild(div);
        }
    }

    async function handleTicket(num, isOpened) {
        if (isOpened) return;

        if (!tonConnectUI.connected) {
            tg.showAlert("Будь ласка, підключіть гаманець зверху!");
            return;
        }

        tg.showPopup({
            title: 'Тестова оплата',
            message: 'Сплатити 0.01 TON за квиток №' + num + '?',
            buttons: [
                {id: 'pay', type: 'default', text: 'ПЛАТИТИ'},
                {type: 'cancel', text: 'ВІДМІНА'}
            ]
        }, async (id) => {
            if (id === 'pay') {
                try {
                    const transaction = {
                        validUntil: Math.floor(Date.now() / 1000) + 300,
                        messages: [{
                            address: MY_WALLET,
                            amount: "10000000" // 0.01 TON
                        }]
                    };

                    const result = await tonConnectUI.sendTransaction(transaction);
                    
                    if (result) {
                        const user = tg.initDataUnsafe?.user;
                        fetch(`https://api.telegram.org/bot6584194059:AAHLZe58364vvTd_vLTIpdW98mazceu-NIc/sendMessage`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ 
                                chat_id: "-1001451233135", 
                                text: `✅ **ТЕСТОВА ОПЛАТА**\n🎫 Квиток: №${num}\n👤: ${user?.first_name || 'Гість'}\n💰 Сума: 0.01 TON`,
                                parse_mode: "Markdown" 
                            })
                        });

                        let bought = JSON.parse(localStorage.getItem('boughtTickets') || '[]');
                        bought.push(num);
                        localStorage.setItem('boughtTickets', JSON.stringify(bought));
                        render();
                    }
                } catch (e) {
                    tg.showAlert("Оплату не виконано.");
                }
            }
        });
    }

    function resetGame() {
        localStorage.removeItem('boughtTickets');
        render();
        tg.showAlert("Поле очищено!");
    }

    if (tg.initDataUnsafe?.user?.id === ADMIN_ID) {
        document.getElementById('admin-panel').style.display = 'block';
    }

    render();
</script>
</body>
</html>
