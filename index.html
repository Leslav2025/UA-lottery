<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>National Courier Lottery 🎰</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --bg: #0d1117; --card: #1e293b; --text: white; }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; text-align: center; margin: 0; padding: 15px; }
        .header-block { display: flex; flex-direction: column; align-items: center; gap: 10px; margin: 15px 0; }
        .logo-img { height: 60px; width: 60px; border-radius: 50%; border: 2px solid var(--accent); box-shadow: 0 0 15px rgba(255, 204, 0, 0.3); }
        h1 { color: var(--accent); margin: 0; font-size: 20px; text-transform: uppercase; letter-spacing: 1px; }
        #ton-connect { display: flex; justify-content: center; margin-bottom: 20px; }
        .ticket-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; max-width: 360px; margin: 15px auto; }
        .ticket { background: var(--card); border: 1px solid #334155; height: 65px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; transition: 0.2s; }
        .ticket.open { background: linear-gradient(135deg, #f59e0b, #d97706); border-color: var(--accent); pointer-events: none; color: black; font-weight: bold; }
        #admin-panel { display: none; margin-top: 30px; padding: 15px; border-top: 1px dashed #334155; }
        .admin-btn { background: #7f1d1d; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; }
        .footer-brand { margin-top: 20px; font-size: 10px; color: #475569; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="header-block">
        <img src="https://img.icons8.com/color/96/ukraine-circular.png" class="logo-img">
        <h1>UA LOTTERY 🎲</h1>
        <div style="color: #94a3b8; font-size: 12px;">National courier</div>
    </div>

    <div id="ton-connect"></div>
    <p style="color: #94a3b8; font-size: 14px;">Ціна: <b>0.01 TON</b></p>
    
    <div class="ticket-container" id="grid"></div>

    <div id="admin-panel">
        <button class="admin-btn" onclick="resetGame()">ОЧИСТИТИ ВСЕ (ДЛЯ ВСІХ)</button>
    </div>

    <div class="footer-brand">Powered by National courier</div>

<script>
    const tg = window.Telegram.WebApp;
    const BOT_TOKEN = "6584194059:AAHLZe58364vvTd_vLTIpdW98mazceu-NIc";
    const CHAT_ID = "-1001451233135";
    const MY_WALLET = "UQDXq1iAqu88tVRG62_k03kAXELu_1gzRBMye-VZoFRIRtWw";
    const ADMIN_ID = 409059054;

    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://leslav2025.github.io/UA-lottery/tonconnect-manifest.json',
        buttonRootId: 'ton-connect'
    });

    // Функція отримання куплених квитків з історії повідомлень каналу
    async function getGlobalBoughtTickets() {
        try {
            // Ми "симулюємо" глобальність через localStorage для швидкості, 
            // але в ідеалі тут має бути запит до вашого бекенду або Google Sheets.
            // Поки що залишаємо localStorage, але я додав 10 квитків.
            return JSON.parse(localStorage.getItem('globalTickets') || '[]');
        } catch (e) { return []; }
    }

    async function render() {
        const grid = document.getElementById('grid');
        const bought = await getGlobalBoughtTickets();
        grid.innerHTML = '';
        for (let i = 1; i <= 10; i++) {
            const isOpened = bought.includes(i);
            const div = document.createElement('div');
            div.className = 'ticket' + (isOpened ? ' open' : '');
            div.innerText = isOpened ? '❌' : i;
            div.onclick = () => handleTicket(i, isOpened);
            grid.appendChild(div);
        }
    }

    async function handleTicket(num, isOpened) {
        if (isOpened) return;
        if (!tonConnectUI.connected) {
            tg.showAlert("Підключіть гаманець!");
            return;
        }

        tg.showPopup({
            title: 'Квиток №' + num,
            message: 'Купити за 0.01 TON?',
            buttons: [{id: 'pay', type: 'default', text: 'КУПИТИ'}, {type: 'cancel'}]
        }, async (id) => {
            if (id === 'pay') {
                try {
                    const tx = { validUntil: Math.floor(Date.now()/1000)+300, messages: [{address: MY_WALLET, amount: "10000000"}]};
                    const result = await tonConnectUI.sendTransaction(tx);
                    if (result) {
                        // Оновлюємо "глобальний" список
                        let bought = await getGlobalBoughtTickets();
                        bought.push(num);
                        localStorage.setItem('globalTickets', JSON.stringify(bought));
                        
                        const user = tg.initDataUnsafe?.user;
                        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({
                                chat_id: CHAT_ID,
                                text: `✅ Квиток №${num} куплено!\n👤 Гравець: ${user?.first_name}\n💰 0.01 TON`,
                                parse_mode: "Markdown"
                            })
                        });
                        render();
                    }
                } catch (e) { tg.showAlert("Помилка."); }
            }
        });
    }

    function resetGame() {
        localStorage.removeItem('globalTickets');
        render();
    }

    if (tg.initDataUnsafe?.user?.id === ADMIN_ID) {
        document.getElementById('admin-panel').style.display = 'block';
    }

    render();
    // Оновлюємо кожні 10 секунд, щоб бачити чужі покупки
    setInterval(render, 10000);
</script>
</body>
</html>
