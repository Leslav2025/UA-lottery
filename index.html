<!DOCTYPE html>
<html>
<head>
    <title>UA-Lottery TON</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #0088cc; color: white; padding: 15px; margin: 0; }
        .ticket-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 20px; }
        .ticket { 
            width: 85px; height: 115px; background: white; color: #0088cc; 
            border-radius: 12px; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; cursor: pointer;
            font-weight: bold; border: 3px solid #ffd700; transition: 0.2s;
        }
        .ticket.bought { background: #555 !important; color: #999 !important; pointer-events: none; border-color: #333; }
        .info { background: rgba(255,255,255,0.15); padding: 15px; border-radius: 15px; margin: 10px; }
        .prize { color: #ffd700; font-size: 1.3em; font-weight: bold; }
        #adminBtn { display: none; margin: 30px auto; padding: 12px 20px; background: #ff4444; color: white; border: 2px solid white; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🎰 UA-Lottery TON</h1>
    <div class="info">
        <div>Ціна: <b>0.01 TON</b></div>
        <div class="prize">Виграш: 0.03 TON 🏆</div>
    </div>
    <div class="ticket-container" id="tickets"></div>

    <button id="adminBtn" onclick="clearGame()">Скинути квитки (АДМІН)</button>

    <script>
        const wallet = "UQDXq1iAqu88tVRG62_k03kAXELu_1gzRBMye-VZoFRIRtWw";
        
        // Показуємо адмін-кнопку, якщо в посиланні є admin
        if (window.location.search.includes('admin')) {
            document.getElementById('adminBtn').style.display = 'block';
        }

        function clearGame() {
            localStorage.clear();
            alert("Квитки очищено!");
            window.location.href = window.location.pathname; // Перезапуск без ?admin
        }

        for (let i = 1; i <= 5; i++) {
            const t = document.createElement('div');
            t.className = 'ticket';
            if (localStorage.getItem('ticket_' + i)) {
                t.classList.add('bought');
                t.innerHTML = `<span>Куплено</span><b>#${i}</b>`;
            } else {
                t.innerHTML = `<span>Квиток</span><b>#${i}</b>`;
            }

            t.onclick = function() {
                const amount = 10000000; // 0.01 TON
                // Використовуємо прямий шлюз Tonkeeper (найстабільніший для Telegram)
                const payLink = `https://app.tonkeeper.com/transfer/${wallet}?amount=${amount}&text=Ticket_${i}`;
                
                localStorage.setItem('ticket_' + i, 'true');
                
                // Спроба відкрити гаманець
                window.location.assign(payLink);
                
                // Через секунду оновлюємо вигляд, щоб квиток став сірим
                setTimeout(() => { location.reload(); }, 1000);
            };
            document.getElementById('tickets').appendChild(t);
        }
    </script>
</body>
</html>
