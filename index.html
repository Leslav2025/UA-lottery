<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UA-LOTTERY — Розіграш</title>
    <style>
        :root {
            --accent: #ffcc00;
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text-secondary: #8b949e;
        }

        body { 
            background-color: var(--bg); 
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            text-align: center; 
            padding: 40px 20px; 
            margin: 0;
        }

        .lottery-title {
            font-size: 14px;
            letter-spacing: 3px;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        h1 { 
            color: var(--accent); 
            text-transform: uppercase; 
            margin-bottom: 30px; 
            font-size: 28px;
            letter-spacing: 1px;
        }

        .order-box { 
            background: var(--card); 
            border: 1px solid var(--border); 
            padding: 25px; 
            border-radius: 20px; 
            max-width: 380px; 
            margin: 0 auto; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.4); 
        }

        .ticket-info {
            background: rgba(255, 204, 0, 0.1);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            border: 1px solid var(--accent);
        }

        label { 
            display: block; 
            text-align: left; 
            margin: 15px 0 8px 10px; 
            color: var(--text-secondary); 
            font-size: 13px; 
        }

        input { 
            width: 100%; 
            padding: 14px; 
            border-radius: 12px; 
            border: 1px solid #334155; 
            background: var(--bg); 
            color: white; 
            font-size: 18px; 
            box-sizing: border-box; 
            outline: none;
            text-align: center;
        }

        .price-display { 
            font-size: 32px; 
            color: var(--accent); 
            font-weight: 700; 
            margin: 20px 0 5px 0; 
            padding-top: 15px; 
            border-top: 1px solid var(--border); 
        }

        .currency-info { 
            font-size: 14px; 
            color: var(--text-secondary); 
            margin-bottom: 25px; 
        }

        .btn-buy { 
            background: var(--accent); 
            color: #000; 
            padding: 18px; 
            width: 100%; 
            border-radius: 15px; 
            border: none; 
            font-weight: bold; 
            font-size: 18px; 
            cursor: pointer; 
            display: block;
            margin-bottom: 15px;
            transition: transform 0.2s;
        }

        .btn-buy:active { transform: scale(0.98); }

        .instruction { 
            font-size: 11px; 
            color: var(--text-secondary); 
            margin-top: 20px; 
            border: 1px dashed var(--border); 
            padding: 10px; 
            border-radius: 10px; 
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="lottery-title">UA-LOTTERY</div>
    <h1>КУПИТИ КВИТОК</h1>

    <div class="order-box">
        <div class="ticket-info">
            🎫 Ціна 1 квитка: <b>0.02 USDT</b>
        </div>

        <label>Кількість квитків:</label>
        <input type="number" id="tickets" value="1" min="1" oninput="updatePrice()">
        
        <div class="price-display"><span id="total">0.02</span> USDT</div>
        <div class="currency-info">
            ≈ <span id="total-uah">1</span> грн | ≈ <span id="total-rub">2</span> руб
        </div>

        <button class="btn-buy" onclick="buyTicket()">ПРИДБАТИ КВИТКИ</button>
        
        <div class="instruction">
            ⚠️ Після натискання бот <b>@tokenpist_bot</b> зафіксує вашу ставку та видасть номери квитків.
        </div>
    </div>

    <script>
        function updatePrice() {
            const pricePerTicket = 0.02;
            const tickets = document.getElementById('tickets').value || 1;
            const total = (pricePerTicket * tickets).toFixed(2);
            
            document.getElementById('total').innerText = total;
            document.getElementById('total-uah').innerText = Math.round(total * 40);
            document.getElementById('total-rub').innerText = Math.round(total * 95);
        }

        function buyTicket() {
            const tickets = document.getElementById('tickets').value;
            const total = document.getElementById('total').innerText;
            
            const msg = `ЛОТЕРЕЯ: ЗАМОВЛЕННЯ КВИТКІВ%0A🎫 Кількість: ${tickets} шт.%0A💰 Сума: ${total} USDT`;
            
            // Відкриваємо бота
            window.open(`https://t.me/tokenpist_bot?text=${msg}`, '_blank');
        }
        
        // Початковий розрахунок
        updatePrice();
    </script>
</body>
</html>
