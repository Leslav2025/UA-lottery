<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>UA LOTTERY 🎰</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tonweb/0.0.66/tonweb.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --bg: #0d1117; --card: #1e293b; --text: white; }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; text-align: center; margin: 0; padding: 15px; }
        .header-block { display: flex; align-items: center; justify-content: center; gap: 12px; margin: 10px 0 20px; }
        .logo-img { height: 45px; width: 45px; border-radius: 50%; border: 2px solid var(--accent); }
        h1 { color: var(--accent); text-shadow: 0 0 15px rgba(255, 204, 0, 0.5); margin: 0; font-size: 24px; }
        #ton-connect { display: flex; justify-content: center; margin-bottom: 20px; }
        .ticket-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; max-width: 340px; margin: 15px auto; }
        .ticket { background: var(--card); border: 2px solid #334155; height: 85px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 26px; cursor: pointer; position: relative; }
        .ticket.open { background: linear-gradient(135deg, #f59e0b, #d97706); border-color: var(--accent); font-weight: bold; pointer-events: none; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1f2937; padding: 25px; border-radius: 25px; border: 2px solid var(--accent); z-index: 100; width: 80%; }
        .back-btn { background: #334155; color: white; border: none; padding: 15px; border-radius: 15px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 15px; }
        #admin-panel { display: none; margin-top: 20px; padding: 10px; border-top: 1px solid #334155; }
    </style>
</head>
<body>

    <div class="header-block">
        <img src="https://img.icons8.com/color/96/ukraine-circular.png" alt="🇺🇦" class="logo-img">
        <h1>UA LOTTERY 🎲</h1>
    </div>

    <div id="ton-connect"></div>

    <div id="game-zone">
        <p style="color: #94a3b8;">Оберіть квиток (100 UA) 👇</p>
        <div class="ticket-container" id="grid"></div>
        <button onclick="showRules()" style="background:none; border:1px solid #334155; color:#94a3b8; padding:8px 15px; border-radius:15px; cursor:pointer;">📜 Правила</button>
    </div>

    <div id="rules-modal" class="modal">
        <h3 style="color: var(--accent);">📜 Правила</h3>
        <p style="font-size: 14px; text-align: left;">1. Підключіть Wallet.<br>2. Оберіть квиток.<br>3. Підтвердіть оплату 100 UA.<br>4. Очікуйте розіграшу!</p>
        <button class="back-btn" onclick="closeModals()">ЗРОЗУМІЛО</button>
    </div>

    <div id="admin-panel">
        <button onclick="resetGame()" style="color:#94a3b8; background:#1e293b; border:1px solid #334155; padding:8px; border-radius:10px;">🔧 Адмін: Скинути</button>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const ADMIN_ID = 409059054;
    const MY_WALLET = "UQDXq1iAqu88tVRG62_k03kAXELu_1gzRBMye-VZoFRIRtWw"; 
    const JETTON_MASTER = "EQBrD-UZ8w2tAyxCNjO8lF4ioTwI-ELiQgF7kclC7gM2UOO_";

    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://leslav2025.github.io/UA-lottery/tonconnect-manifest.json',
        buttonRootId: 'ton-connect'
    });

    function createTickets() {
        const grid = document.getElementById('grid');
        const bought = JSON.parse(localStorage.getItem('boughtTickets') || '[]');
        grid.innerHTML = '';
        for (let i = 1; i <= 6; i++) {
            const div = document.createElement('div');
            const isOpened = bought.includes(i);
            div.className = 'ticket' + (isOpened ? ' open' : '');
            div.innerText = isOpened ? "№" + i : "?";
            div.onclick = () => handlePay(i, isOpened);
            grid.appendChild(div);
        }
    }

    async function handlePay(num, isOpened) {
        if (isOpened) return;
        if (!tonConnectUI.connected) {
            tg.showAlert("Спочатку підключіть гаманець!");
            return;
        }

        try {
            const tonweb = new TonWeb();
            const userAddress = tonConnectUI.account.address;
            
            // Отримуємо Jetton-гаманець користувача
            const jettonMaster = new TonWeb.token.jetton.JettonMaster(tonweb.provider, { address: JETTON_MASTER });
            const userJettonAddress = await jettonMaster.getJettonWalletAddress(new TonWeb.utils.Address(userAddress));

            // Створюємо Payload для переказу 100 UA
            const cell = new TonWeb.boc.Cell();
            cell.bits.writeUint(0xf8a7ea5, 32); 
            cell.bits.writeUint(0, 64);          
            cell.bits.writeCoins(TonWeb.utils.toNano('100')); 
            cell.bits.writeAddress(new TonWeb.utils.Address(MY_WALLET)); 
            cell.bits.writeAddress(new TonWeb.utils.Address(userAddress)); 
            cell.bits.writeBit(false); 
            cell.bits.writeCoins(TonWeb.utils.toNano('0.001')); 
            cell.bits.writeBit(false); 

            const boc = TonWeb.utils.bytesToBase64(await cell.toBoc());

            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 300,
                messages: [{
                    address: userJettonAddress.toString(true, true, true),
                    amount: TonWeb.utils.toNano('0.05').toString(),
                    payload: boc
                }]
            };

            const result = await tonConnectUI.sendTransaction(transaction);
            if (result) {
                let bought = JSON.parse(localStorage.getItem('boughtTickets') || '[]');
                bought.push(num);
                localStorage.setItem('boughtTickets', JSON.stringify(bought));
                
                fetch(`https://api.telegram.org/bot6584194059:AAHLZe58364vvTd_vLTIpdW98mazceu-NIc/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        chat_id: "-1001451233135", 
                        text: `🎰 Квиток №${num} КУПЛЕНО!\n👤: ${tg.initDataUnsafe?.user?.first_name || "Гість"}` 
                    })
                });
                createTickets();
                tg.showAlert("Успішно! Квиток ваш.");
            }
        } catch (e) {
            console.error(e);
            tg.showAlert("Помилка! Можливо, Telegram Wallet блокує переказ. Спробуйте Tonkeeper.");
        }
    }

    function showRules() { document.getElementById('rules-modal').style.display = 'block'; }
    function closeModals() { document.getElementById('rules-modal').style.display = 'none'; }
    function resetGame() { localStorage.removeItem('boughtTickets'); createTickets(); }

    if (tg.initDataUnsafe?.user?.id === ADMIN_ID) { document.getElementById('admin-panel').style.display = 'block'; }
    createTickets();
</script>
</body>
</html>
